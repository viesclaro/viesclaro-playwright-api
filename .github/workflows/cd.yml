name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build, push GHCR, deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ViesClaro.Playwright/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GITHUB_USERNAME=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GHCR_TOKEN }}

      - name: Trigger Dokploy deploy
        if: success() && vars.DOKPLOY_PLAYWRIGHT_APP_ID != ''
        # Dokploy roda em IP privado (192.168.x) inacessível pelo runner público.
        # O auto-deploy do Dokploy (poll do GHCR :latest) cobre o caso onde este
        # webhook falha — então não bloqueamos o pipeline. Connect timeout curto
        # (10s) pra evitar adicionar 2min de espera quando o IP não responde.
        continue-on-error: true
        run: |
          curl -fsSL --connect-timeout 10 -X POST "${{ secrets.DOKPLOY_URL }}/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ vars.DOKPLOY_PLAYWRIGHT_APP_ID }}\"}" \
            || echo "::warning::Webhook Dokploy não acessível do runner público — auto-deploy via :latest poll cobre."
